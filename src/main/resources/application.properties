spring.application.name=realtimeapi

# Database
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:realtime}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Firebase
app.firebase-configuration-file=${FIREBASE_KEY_PATH:src/main/resources/firebase-key.json}

# Admin
app.admin-token=${ADMIN_TOKEN:#{T(java.util.UUID).randomUUID().toString()}}

# OpenAI Proxy
app.openai-api-key=${OPENAI_API_KEY:}
# Unified realtime model (text+audio+image input, text+audio output)
# Pricing: $4/1M text input, $32/1M audio input, $64/1M audio output
# Context: 32K tokens, max output: 4096 tokens
app.openai-model=${OPENAI_MODEL:gpt-realtime-2025-08-28}
app.lesson-model=${LESSON_MODEL:gpt-5-mini}

# Storage
app.storage-path=${STORAGE_PATH:./storage/}

# CORS
app.cors-origins=${CORS_ORIGINS:http://localhost:3000}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# HikariCP connection pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:20}
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=10000

# Actuator (health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
