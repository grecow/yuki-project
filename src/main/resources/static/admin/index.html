<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuki Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }
    .header { background: #fff; border-bottom: 1px solid #e5e5e7; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header .badge { background: #f84700; color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .card .label { font-size: 13px; color: #86868b; margin-bottom: 4px; }
    .card .value { font-size: 32px; font-weight: 700; }
    .card .sub { font-size: 12px; color: #86868b; margin-top: 4px; }
    .section { margin-bottom: 32px; }
    .section h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    th { background: #f5f5f7; padding: 12px 16px; text-align: left; font-size: 13px; color: #86868b; font-weight: 600; }
    td { padding: 12px 16px; border-top: 1px solid #f0f0f0; font-size: 14px; }
    tr:hover td { background: #fafafa; }
    .badge-premium { background: #f84700; color: #fff; padding: 2px 8px; border-radius: 8px; font-size: 11px; }
    .badge-free { background: #e5e5e7; color: #86868b; padding: 2px 8px; border-radius: 8px; font-size: 11px; }
    .badge-trial { background: #1C48FF; color: #fff; padding: 2px 8px; border-radius: 8px; font-size: 11px; }
    .streak { color: #f84700; font-weight: 600; }
    .login { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-box { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
    .login-box h2 { margin-bottom: 20px; }
    .login-box input { width: 100%; padding: 12px 16px; border: 1px solid #e5e5e7; border-radius: 10px; font-size: 15px; margin-bottom: 16px; }
    .login-box button { width: 100%; padding: 14px; background: #f84700; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .login-box button:hover { background: #e03e00; }
    .loading { text-align: center; padding: 40px; color: #86868b; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab { padding: 8px 20px; border-radius: 20px; background: #e5e5e7; cursor: pointer; font-size: 14px; font-weight: 500; }
    .tab.active { background: #1d1d1f; color: #fff; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    let TOKEN = localStorage.getItem('admin_token') || '';
    let currentTab = 'dashboard';

    function api(path) {
      return fetch(path, { headers: { 'Authorization': 'Bearer ' + TOKEN } }).then(r => {
        if (r.status === 403) { localStorage.removeItem('admin_token'); showLogin(); throw new Error('forbidden'); }
        return r.json();
      });
    }

    function showLogin() {
      document.getElementById('app').innerHTML = `
        <div class="login">
          <div class="login-box">
            <h2>🔒 Yuki Admin</h2>
            <input type="password" id="token-input" placeholder="Admin token" />
            <button onclick="doLogin()">Connect</button>
          </div>
        </div>`;
    }

    function doLogin() {
      TOKEN = document.getElementById('token-input').value;
      localStorage.setItem('admin_token', TOKEN);
      loadDashboard();
    }

    async function loadDashboard() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="header">
          <h1>🎌 Yuki Admin</h1>
          <span class="badge">LIVE</span>
        </div>
        <div class="container">
          <div class="tabs">
            <div class="tab ${currentTab === 'dashboard' ? 'active' : ''}" onclick="switchTab('dashboard')">Dashboard</div>
            <div class="tab ${currentTab === 'users' ? 'active' : ''}" onclick="switchTab('users')">Users</div>
          </div>
          <div id="content"><div class="loading">Loading...</div></div>
        </div>`;

      if (currentTab === 'dashboard') await renderDashboard();
      else if (currentTab === 'users') await renderUsers();
    }

    function switchTab(tab) { currentTab = tab; loadDashboard(); }

    async function renderDashboard() {
      try {
        const d = await api('/admin/dashboard');
        document.getElementById('content').innerHTML = `
          <div class="grid">
            <div class="card"><div class="label">Total Users</div><div class="value">${d.totalUsers}</div></div>
            <div class="card"><div class="label">Premium</div><div class="value">${d.premiumUsers}</div><div class="sub">${d.conversionRate}% conversion</div></div>
            <div class="card"><div class="label">Active Today</div><div class="value">${d.activeToday}</div></div>
            <div class="card"><div class="label">In Trial</div><div class="value">${d.inTrial}</div></div>
            <div class="card"><div class="label">Avg Streak</div><div class="value streak">🔥 ${d.avgStreak}</div></div>
            <div class="card"><div class="label">Avg XP</div><div class="value">${d.avgXp}</div></div>
            <div class="card"><div class="label">Total Lessons</div><div class="value">${d.totalLessons}</div></div>
          </div>`;
      } catch(e) { if (e.message !== 'forbidden') document.getElementById('content').innerHTML = '<div class="loading">Error loading dashboard</div>'; }
    }

    async function renderUsers() {
      try {
        const users = await api('/admin/users?page=0&size=50');
        let rows = users.map(u => `
          <tr>
            <td>${u.user?.fullName || '—'}</td>
            <td>${u.user?.email || '—'}</td>
            <td>${u.language || '—'}</td>
            <td><span class="streak">🔥 ${u.streak || 0}</span></td>
            <td>${u.xp || 0} XP</td>
            <td>${u.tokens || 0}</td>
            <td>${u.premium ? '<span class="badge-premium">Premium</span>' : u.trialStartDate ? '<span class="badge-trial">Trial</span>' : '<span class="badge-free">Free</span>'}</td>
            <td>${u.doneToday ? '✅' : '—'}</td>
          </tr>`).join('');
        document.getElementById('content').innerHTML = `
          <div class="section">
            <table>
              <thead><tr><th>Name</th><th>Email</th><th>Language</th><th>Streak</th><th>XP</th><th>Tokens</th><th>Plan</th><th>Today</th></tr></thead>
              <tbody>${rows || '<tr><td colspan="8" style="text-align:center;color:#86868b;">No users yet</td></tr>'}</tbody>
            </table>
          </div>`;
      } catch(e) { if (e.message !== 'forbidden') document.getElementById('content').innerHTML = '<div class="loading">Error loading users</div>'; }
    }

    // Init
    if (TOKEN) loadDashboard(); else showLogin();
  </script>
</body>
</html>
